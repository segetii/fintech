name: amttp_app
description: "AMTTP Cross-Platform DeFi Application with DQN-powered fraud detection"
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI & State Management
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.4.0
  go_router: ^12.0.0
  
  # Web3 & Blockchain
  web3dart: ^2.7.3
  http: ^1.1.0
  convert: ^3.1.1
  js: ^0.6.7
  
  # HTTP & API
  dio: ^5.3.0
  
  # Charts & Visualization
  fl_chart: ^0.65.0
  
  # Local Storage & Security
  shared_preferences: ^2.2.0
  
  # UI Enhancements
  animations: ^2.0.7
  
  # Utilities
  intl: ^0.18.1
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_annotation: ^4.8.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true