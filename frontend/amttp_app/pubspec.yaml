name: amttp_app
description: "AMTTP Cross-Platform DeFi Application with DQN-powered fraud detection"
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI & State Management
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.4.0
  go_router: ^17.0.1
  
  # Web3 & Blockchain
  web3dart: ^3.0.1
  http: ^1.2.0
  convert: ^3.1.1
  
  # HTTP & API
  dio: ^5.3.0
  
  # Charts & Visualization
  fl_chart: ^1.1.1
  
  # Local Storage & Security
  shared_preferences: ^2.3.0
  crypto: ^3.0.3
  
  # UI Enhancements
  animations: ^2.0.11
  
  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  json_annotation: ^4.9.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true