<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="amttp_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>AMTTP - Secure Transfers</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // MetaMask helper functions for Flutter interop
    window.ethereum_helper = {
      isMetaMaskAvailable: function() {
        return typeof window.ethereum !== 'undefined';
      },
      
      requestAccounts: async function() {
        if (!this.isMetaMaskAvailable()) {
          throw new Error('MetaMask not installed');
        }
        try {
          const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
          console.log('MetaMask accounts:', accounts);
          return accounts;
        } catch (error) {
          console.error('MetaMask connect error:', error);
          throw error;
        }
      },
      
      getAccounts: async function() {
        if (!this.isMetaMaskAvailable()) return [];
        try {
          return await window.ethereum.request({ method: 'eth_accounts' });
        } catch (e) {
          return [];
        }
      },
      
      sendTransaction: async function(from, to, value) {
        const txHash = await window.ethereum.request({
          method: 'eth_sendTransaction',
          params: [{ from, to, value }]
        });
        return txHash;
      },
      
      switchChain: async function(chainId) {
        try {
          await window.ethereum.request({
            method: 'wallet_switchEthereumChain',
            params: [{ chainId }]
          });
          return true;
        } catch (error) {
          if (error.code === 4902) {
            // Chain not added - need to add it
            return false;
          }
          throw error;
        }
      },
      
      addChain: async function(chainParams) {
        await window.ethereum.request({
          method: 'wallet_addEthereumChain',
          params: [chainParams]
        });
        return true;
      }
    };
    
    console.log('MetaMask helper loaded, available:', window.ethereum_helper.isMetaMaskAvailable());
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
