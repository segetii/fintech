events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    upstream flutter_app {
        server host.docker.internal:8889;
    }

    upstream nextjs_warroom {
        server host.docker.internal:3006;
    }

    upstream orchestrator_api {
        server host.docker.internal:8007;
    }

    upstream sanctions_api {
        server host.docker.internal:8004;
    }

    upstream geo_risk_api {
        server host.docker.internal:8006;
    }

    server {
        listen 80;
        server_name localhost;

        # ═══════════════════════════════════════════════════════════════════
        # FLUTTER CONSUMER APP - Main entry point at /
        # ═══════════════════════════════════════════════════════════════════
        location / {
            proxy_pass http://flutter_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # ═══════════════════════════════════════════════════════════════════
        # NEXT.JS WAR ROOM - Institutional dashboard at /warroom/
        # ═══════════════════════════════════════════════════════════════════
        location /warroom/ {
            rewrite ^/warroom/(.*) /$1 break;
            proxy_pass http://nextjs_warroom;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Next.js static assets
        location /_next/ {
            proxy_pass http://nextjs_warroom;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # ═══════════════════════════════════════════════════════════════════
        # API ROUTES - Backend services
        # ═══════════════════════════════════════════════════════════════════
        
        # Orchestrator API
        location /api/ {
            proxy_pass http://orchestrator_api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }

        # Sanctions API
        location /sanctions/ {
            proxy_pass http://sanctions_api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header 'Access-Control-Allow-Origin' '*' always;
        }

        # Geographic Risk API
        location /geo/ {
            proxy_pass http://geo_risk_api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header 'Access-Control-Allow-Origin' '*' always;
        }

        # Health check
        location /health {
            return 200 'AMTTP Gateway OK';
            add_header Content-Type text/plain;
        }
    }
}
