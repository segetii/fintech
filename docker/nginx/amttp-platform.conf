# AMTTP Platform - Unified Nginx Configuration
# 
# Routes requests to Flutter Wallet app and Next.js War Room
# 
# Usage:
#   1. Copy to /etc/nginx/sites-available/amttp
#   2. Link: ln -s /etc/nginx/sites-available/amttp /etc/nginx/sites-enabled/
#   3. Test: nginx -t
#   4. Reload: systemctl reload nginx

upstream flutter_app {
    server 127.0.0.1:3010;
    keepalive 32;
}

upstream nextjs_app {
    server 127.0.0.1:3006;
    keepalive 32;
}

upstream orchestrator_api {
    server 127.0.0.1:8007;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name app.amttp.io localhost;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # ─────────────────────────────────────────────────────────────────────────────
    # API Routes - Backend services
    # ─────────────────────────────────────────────────────────────────────────────
    
    location /api/ {
        proxy_pass http://orchestrator_api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # ─────────────────────────────────────────────────────────────────────────────
    # War Room - Next.js App (Compliance/Monitoring Dashboard)
    # ─────────────────────────────────────────────────────────────────────────────
    
    location /war-room {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js static assets
    location /_next/ {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, immutable, max-age=604800";
    }

    # ─────────────────────────────────────────────────────────────────────────────
    # Wallet App - Flutter Web (Default - handles everything else)
    # ─────────────────────────────────────────────────────────────────────────────
    
    location / {
        proxy_pass http://flutter_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Flutter static assets
    location /assets/ {
        proxy_pass http://flutter_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, immutable, max-age=604800";
    }

    # Flutter service worker
    location /flutter_service_worker.js {
        proxy_pass http://flutter_app;
        add_header Cache-Control "no-cache";
    }

    # ─────────────────────────────────────────────────────────────────────────────
    # Health checks
    # ─────────────────────────────────────────────────────────────────────────────
    
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ─────────────────────────────────────────────────────────────────────────────
    # Error pages
    # ─────────────────────────────────────────────────────────────────────────────
    
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

