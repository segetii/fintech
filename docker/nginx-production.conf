# ═══════════════════════════════════════════════════════════════════════════════
# NGINX Production Configuration for AMTTP Platform
# Optimized for Cloudflare Tunnel reverse proxy
# ═══════════════════════════════════════════════════════════════════════════════

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format with Cloudflare headers
    log_format cloudflare '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_cf_connecting_ip" '
                          '"$http_cf_ray" "$http_cf_ipcountry"';

    access_log /var/log/nginx/access.log cloudflare;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript 
               text/xml application/xml application/xml+rss text/javascript
               application/wasm image/svg+xml;

    # Security headers (Cloudflare handles TLS)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Upstream services
    upstream nextjs {
        server 127.0.0.1:3004;
        keepalive 32;
    }

    upstream orchestrator {
        server 127.0.0.1:8007;
        keepalive 32;
    }

    upstream oracle {
        server 127.0.0.1:3001;
        keepalive 32;
    }

    upstream risk_engine {
        server 127.0.0.1:8000;
        keepalive 16;
    }

    upstream zknaf {
        server 127.0.0.1:8010;
        keepalive 16;
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # Main Server - Flutter Web App (Port 80)
    # Access: https://amttp.yourdomain.com
    # ═══════════════════════════════════════════════════════════════════════════
    
    server {
        listen 80;
        server_name _;
        
        root /var/www/flutter;
        index index.html;

        # Trust Cloudflare's connecting IP
        set_real_ip_from 173.245.48.0/20;
        set_real_ip_from 103.21.244.0/22;
        set_real_ip_from 103.22.200.0/22;
        set_real_ip_from 103.31.4.0/22;
        set_real_ip_from 141.101.64.0/18;
        set_real_ip_from 108.162.192.0/18;
        set_real_ip_from 190.93.240.0/20;
        set_real_ip_from 188.114.96.0/20;
        set_real_ip_from 197.234.240.0/22;
        set_real_ip_from 198.41.128.0/17;
        set_real_ip_from 162.158.0.0/15;
        set_real_ip_from 104.16.0.0/13;
        set_real_ip_from 104.24.0.0/14;
        set_real_ip_from 172.64.0.0/13;
        set_real_ip_from 131.0.72.0/22;
        real_ip_header CF-Connecting-IP;

        # Rate limiting
        limit_req zone=general_limit burst=100 nodelay;
        limit_conn conn_limit 50;

        # Health check
        location /health {
            access_log off;
            return 200 '{"status":"healthy","version":"1.0.0","timestamp":"$time_iso8601"}';
            add_header Content-Type application/json;
        }

        # Readiness probe
        location /ready {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Static assets with caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Flutter service worker
        location = /flutter_service_worker.js {
            add_header Cache-Control "no-cache";
            try_files $uri =404;
        }

        # API routes - proxy to orchestrator
        location /api/ {
            limit_req zone=api_limit burst=200 nodelay;
            
            proxy_pass http://orchestrator/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 32k;
            
            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }

        # zkNAF endpoints
        location /zknaf/ {
            limit_req zone=api_limit burst=50 nodelay;
            
            proxy_pass http://zknaf/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # Risk engine endpoints
        location /risk/ {
            limit_req zone=api_limit burst=100 nodelay;
            
            proxy_pass http://risk_engine/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Oracle service endpoints
        location /oracle/ {
            limit_req zone=api_limit burst=100 nodelay;
            
            proxy_pass http://oracle/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Next.js War Room dashboard - proxy to Next.js on same container
        location /war-room {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }


        # Dashboard redirect to war-room
        location /dashboard {
            return 302 /war-room$is_args$args;
        }

        # Next.js compliance pages
        location /compliance {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Next.js static assets (^~ ensures priority over regex locations)
        location ^~ /_next {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Flutter app - SPA routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Block sensitive paths
        location ~ /\. {
            deny all;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # Dashboard Server - Next.js (Port 3005)
    # Access: https://dashboard.amttp.yourdomain.com
    # ═══════════════════════════════════════════════════════════════════════════
    
    server {
        listen 3005;
        server_name _;

        location / {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /_next/static {
            alias /var/www/nextjs/static;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # API Server (Port 8080) - Direct API access
    # Access: https://api.amttp.yourdomain.com
    # ═══════════════════════════════════════════════════════════════════════════
    
    server {
        listen 8080;
        server_name _;

        location /health {
            access_log off;
            return 200 '{"status":"healthy","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        location /v1/ {
            limit_req zone=api_limit burst=200 nodelay;
            
            proxy_pass http://orchestrator/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-API-Version "1.0";
        }

        location /zknaf/ {
            proxy_pass http://zknaf/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
        }

        location /risk/ {
            proxy_pass http://risk_engine/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
        }
    }
}
