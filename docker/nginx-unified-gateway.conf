# ═══════════════════════════════════════════════════════════════════════════════
# AMTTP Unified Gateway — Nginx Config with Auth + RBAC Enforcement
# ═══════════════════════════════════════════════════════════════════════════════
#
# Architecture:
#   /               → Login page (public, no auth required)
#   /auth/*         → Auth Gateway API (public)
#   /consumer/*     → Flutter Consumer App (requires auth, R1-R6)
#   /app/*          → Next.js War Room (requires auth, R3-R6 only)
#                     Next.js has basePath: '/app' — no prefix stripping needed.
#   /api/*          → Backend APIs (requires auth)
#   /health         → Health check (public)
#
# Auth flow:
#   1. User visits / → sees login page
#   2. Login form POSTs to /auth/login → gets JWT cookie
#   3. Redirect to /app/ or /consumer/ based on role
#   4. All subsequent requests validated via auth_request → /auth/validate
#
# ═══════════════════════════════════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ═══════════════════════════════════════════════════════════════════════════
    # Upstream Services
    # ═══════════════════════════════════════════════════════════════════════════

    # Auth gateway — reachable by Docker service name (same compose network)
    upstream auth_gateway {
        server auth-gateway:8020;
    }

    # Flutter consumer app — running on host
    upstream flutter_app {
        server host.docker.internal:3010;
    }

    # Next.js war room — running on host, configured with basePath: '/app'
    upstream nextjs_app {
        server host.docker.internal:3006;
    }

    # Backend API services — running on host
    upstream orchestrator_api {
        server host.docker.internal:8007;
    }

    upstream risk_engine_api {
        server host.docker.internal:8000;
    }

    upstream oracle_api {
        server host.docker.internal:3001;
    }

    upstream sanctions_api {
        server host.docker.internal:8004;
    }

    upstream monitoring_api {
        server host.docker.internal:8005;
    }

    upstream geo_risk_api {
        server host.docker.internal:8006;
    }

    upstream integrity_api {
        server host.docker.internal:8008;
    }

    upstream zknaf_api {
        server host.docker.internal:8010;
    }

    upstream policy_api {
        server host.docker.internal:8003;
    }

    upstream fca_compliance_api {
        server host.docker.internal:8002;
    }

    upstream explainability_api {
        server host.docker.internal:8009;
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # Main Server — Port 80 (single entry point)
    # ═══════════════════════════════════════════════════════════════════════════

    server {
        listen 80;
        server_name _;

        # Large client body for file uploads
        client_max_body_size 50m;

        # ─── Internal auth subrequest ────────────────────────────────────
        location = /_auth_check {
            internal;
            proxy_pass http://auth_gateway/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
        }

        # ─── PUBLIC: Health check ────────────────────────────────────────
        location /health {
            access_log off;
            return 200 '{"status":"healthy","gateway":"unified","services":["auth","flutter","nextjs","backend"]}';
            add_header Content-Type application/json;
        }

        # ─── PUBLIC: Auth endpoints ──────────────────────────────────────
        location /auth/ {
            proxy_pass http://auth_gateway/auth/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
        }

        # ─── PUBLIC: Login page (exact match for root) ───────────────────
        location = / {
            root /var/www/login;
            index index.html;
            try_files /index.html =404;
        }

        # Static assets for login page
        location /login-assets/ {
            root /var/www/login;
            try_files $uri =404;
        }

        # ─── PROTECTED: Flutter Consumer App ─────────────────────────────
        # Flutter SPA served from /consumer/ — prefix stripped because
        # flutter build has <base href="/">
        location /consumer/ {
            auth_request /_auth_check;
            auth_request_set $auth_user $upstream_http_x_auth_user;
            auth_request_set $auth_role $upstream_http_x_auth_role;
            error_page 401 = @login_redirect;

            # Strip /consumer prefix for Flutter SPA
            rewrite ^/consumer/(.*) /$1 break;
            proxy_pass http://flutter_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Auth-User $auth_user;
            proxy_set_header X-Auth-Role $auth_role;
            proxy_cache_bypass $http_upgrade;
        }

        location = /consumer {
            return 301 /consumer/;
        }

        # ─── PROTECTED: Next.js War Room App ─────────────────────────────
        # Next.js is configured with basePath: '/app', so DO NOT strip prefix.
        # All Next.js URLs already include /app/ (pages, _next assets, etc).
        location /app/ {
            auth_request /_auth_check;
            auth_request_set $auth_user $upstream_http_x_auth_user;
            auth_request_set $auth_role $upstream_http_x_auth_role;

            error_page 401 = @login_redirect;
            error_page 403 = @forbidden;

            # Pass the full path including /app/ — Next.js basePath handles it
            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Auth-User $auth_user;
            proxy_set_header X-Auth-Role $auth_role;
            proxy_cache_bypass $http_upgrade;

            # Dev mode pages can take long to compile (detection-studio ~200s)
            proxy_connect_timeout 300s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
        }

        # Next.js with basePath prefers /app (without trailing slash).
        # Match both /app and /app/* via two location blocks.
        location = /app {
            auth_request /_auth_check;
            auth_request_set $auth_user $upstream_http_x_auth_user;
            auth_request_set $auth_role $upstream_http_x_auth_role;

            error_page 401 = @login_redirect;
            error_page 403 = @forbidden;

            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Auth-User $auth_user;
            proxy_set_header X-Auth-Role $auth_role;

            proxy_connect_timeout 300s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
        }

        # ─── PROTECTED: Backend APIs ─────────────────────────────────────
        location /api/ {
            auth_request /_auth_check;
            auth_request_set $auth_user $upstream_http_x_auth_user;
            auth_request_set $auth_role $upstream_http_x_auth_role;
            error_page 401 = @api_unauthorized;

            proxy_pass http://orchestrator_api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Auth-User $auth_user;
            proxy_set_header X-Auth-Role $auth_role;
        }

        # Risk Engine
        location /api/risk/ {
            auth_request /_auth_check;
            error_page 401 = @api_unauthorized;
            proxy_pass http://risk_engine_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Oracle Service
        location /api/oracle/ {
            auth_request /_auth_check;
            error_page 401 = @api_unauthorized;
            proxy_pass http://oracle_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Sanctions
        location /api/sanctions/ {
            auth_request /_auth_check;
            error_page 401 = @api_unauthorized;
            proxy_pass http://sanctions_api/;
            proxy_set_header Host $host;
        }

        # Monitoring
        location /api/monitoring/ {
            auth_request /_auth_check;
            error_page 401 = @api_unauthorized;
            proxy_pass http://monitoring_api/;
            proxy_set_header Host $host;
        }

        # Geo Risk
        location /api/geo/ {
            auth_request /_auth_check;
            error_page 401 = @api_unauthorized;
            proxy_pass http://geo_risk_api/;
            proxy_set_header Host $host;
        }

        # Integrity
        location /api/integrity/ {
            auth_request /_auth_check;
            error_page 401 = @api_unauthorized;
            proxy_pass http://integrity_api/;
            proxy_set_header Host $host;
        }

        # zkNAF
        location /api/zknaf/ {
            auth_request /_auth_check;
            error_page 401 = @api_unauthorized;
            proxy_pass http://zknaf_api/;
            proxy_set_header Host $host;
        }

        # Policy Service
        location /api/policies/ {
            auth_request /_auth_check;
            error_page 401 = @api_unauthorized;
            proxy_pass http://policy_api/;
            proxy_set_header Host $host;
        }

        # FCA Compliance Service
        location /api/compliance/ {
            auth_request /_auth_check;
            error_page 401 = @api_unauthorized;
            proxy_pass http://fca_compliance_api/;
            proxy_set_header Host $host;
        }

        # Explainability Service
        location /api/explainability/ {
            auth_request /_auth_check;
            error_page 401 = @api_unauthorized;
            proxy_pass http://explainability_api/;
            proxy_set_header Host $host;
        }

        # ─── Error handlers ──────────────────────────────────────────────

        location @login_redirect {
            return 302 /?redirect=$request_uri;
        }

        location @forbidden {
            default_type application/json;
            return 403 '{"error":"Forbidden","message":"Your role does not have access to this application. R3+ required for War Room."}';
        }

        location @api_unauthorized {
            default_type application/json;
            return 401 '{"error":"Unauthorized","message":"Please log in at / to access API"}';
        }

        # ─── Default: return 404 for any unknown path ────────────────────
        # Do NOT redirect to / — that causes infinite redirect loops.
        location / {
            default_type application/json;
            return 404 '{"error":"Not Found","message":"Unknown route. Use /app/ for War Room, /consumer/ for Consumer App, or /api/ for APIs."}';
        }
    }
}
