# ═══════════════════════════════════════════════════════════════════════════════
# NGINX Configuration for AMTTP Platform
# Reverse proxy for all services
# ═══════════════════════════════════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ═══════════════════════════════════════════════════════════════════════════
    # Upstream Services
    # ═══════════════════════════════════════════════════════════════════════════

    upstream nextjs {
        server 127.0.0.1:3005;
    }

    upstream orchestrator {
        server 127.0.0.1:8007;
    }

    upstream risk_engine {
        # Risk engine container on amttp-network (internal port 8000)
        server risk-engine:8000;
    }

    upstream sanctions {
        server 127.0.0.1:8004;
    }

    upstream monitoring {
        server 127.0.0.1:8005;
    }

    upstream geo_risk {
        server 127.0.0.1:8006;
    }

    upstream integrity {
        server 127.0.0.1:8008;
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # Main Server Block - Flutter App (Port 80)
    # ═══════════════════════════════════════════════════════════════════════════

    server {
        listen 80;
        server_name _;
    # allow embedding for SIEM UI anywhere within this server
    # (strip restrictive headers from upstream; no X-Frame-Options added)

        root /var/www/flutter;
        index index.html;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 '{"status":"healthy","services":["flutter","nextjs","backend"]}';
            add_header Content-Type application/json;
        }

        # API Routes - Proxy to backend services
        location /api/ {
            # strip /api prefix when forwarding to orchestrator
            proxy_pass http://orchestrator/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # Risk Engine
        location /risk/ {
            proxy_pass http://risk_engine/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header 'Access-Control-Allow-Origin' '*' always;
        }

        # Sanctions API
        location /sanctions/ {
            proxy_pass http://sanctions/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header 'Access-Control-Allow-Origin' '*' always;
        }

        # Monitoring API
        location /monitoring/ {
            proxy_pass http://monitoring/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header 'Access-Control-Allow-Origin' '*' always;
        }

        # Geo Risk API
        location /geo/ {
            proxy_pass http://geo_risk/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header 'Access-Control-Allow-Origin' '*' always;
        }

        # Integrity Service API
        location /integrity/ {
            proxy_pass http://integrity/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type,Authorization' always;
            
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # Direct integrity verification endpoint (Flutter expects this path)
        location /verify-integrity {
            proxy_pass http://integrity/verify-integrity;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Content-Type application/json;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type,Authorization' always;
            
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # Dashboard (Next.js) - Accessible at /dashboard
        location /dashboard {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }

        # Compliance (Next.js) - For FATF Rules page
        location /compliance {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }

        # Reports/Data Studio (Next.js) - For Detection Studio page
        location /reports {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }

        # Risk Engine / SIEM Dashboard (Next.js) - Detection Studio should load this
        # Map /siem -> Next.js root (/) to serve the SIEM dashboard
        location = /siem {
            return 302 /siem/;
        }

        location /siem/ {
            proxy_pass http://nextjs/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
            # allow embedding in Flutter web iframe
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
        }

        location /_next/ {
            proxy_pass http://nextjs/_next/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
        }

        location /_next {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Flutter Web App - Default
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # Direct Service Access (for development/debugging)
    # ═══════════════════════════════════════════════════════════════════════════

    # Next.js Dashboard Direct Access
    server {
        listen 3004;
        server_name _;

        location / {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
