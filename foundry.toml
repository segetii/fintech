[profile.default]
src = "contracts"
out = "forge-out"
libs = ["node_modules", "lib"]
test = "test/foundry"
cache_path = "forge-cache"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
via_ir = true
verbosity = 2
ffi = false
remappings = ["@openzeppelin/=node_modules/@openzeppelin/", "@layerzerolabs/=node_modules/@layerzerolabs/", "forge-std/=lib/forge-std/src/"]

[fuzz]
runs = 1000
max_test_rejects = 65536
seed = "0x3e8"
dictionary_weight = 40

[invariant]
runs = 256
depth = 15
fail_on_revert = false
