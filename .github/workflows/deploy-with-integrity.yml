# AMTTP Production Deployment with UI Integrity Protection
#
# This workflow:
# 1. Builds the frontend
# 2. Generates integrity hashes for critical components
# 3. Registers hashes with the integrity service
# 4. Deploys with verified hashes

name: Deploy with Integrity Protection

on:
  push:
    branches: [main, production]
  workflow_dispatch:

env:
  INTEGRITY_API: ${{ secrets.INTEGRITY_API_URL }}
  INTEGRITY_ADMIN_KEY: ${{ secrets.INTEGRITY_ADMIN_KEY }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend/frontend
        run: npm ci
      
      - name: Generate integrity hashes
        working-directory: frontend/frontend
        run: npm run generate-hashes
      
      - name: Upload hash manifest as artifact
        uses: actions/upload-artifact@v3
        with:
          name: integrity-manifest
          path: frontend/frontend/public/integrity-hashes.json
      
      - name: Register hashes with integrity service
        working-directory: frontend/frontend
        run: |
          if [ -f public/register-hashes.sh ]; then
            chmod +x public/register-hashes.sh
            # Replace localhost with actual service URL
            sed -i "s|http://localhost:8008|${INTEGRITY_API}|g" public/register-hashes.sh
            bash public/register-hashes.sh
          fi
      
      - name: Build frontend
        working-directory: frontend/frontend
        run: npm run build
        env:
          NEXT_PUBLIC_INTEGRITY_API: ${{ secrets.INTEGRITY_API_URL }}
          NEXT_PUBLIC_ORCHESTRATOR_API: ${{ secrets.ORCHESTRATOR_API_URL }}
      
      - name: Run integrity verification
        working-directory: frontend/frontend
        run: |
          echo "Verifying integrity manifest was created..."
          if [ ! -f public/integrity-hashes.json ]; then
            echo "ERROR: Integrity manifest not found!"
            exit 1
          fi
          
          # Verify hash count
          HASH_COUNT=$(jq '.components | length' public/integrity-hashes.json)
          echo "Generated hashes for $HASH_COUNT components"
          
          if [ "$HASH_COUNT" -lt 2 ]; then
            echo "WARNING: Expected at least 2 components, got $HASH_COUNT"
          fi
      
      # Add your deployment steps here
      # - name: Deploy to production
      #   run: |
      #     # Your deployment commands
      
      - name: Create deployment summary
        run: |
          echo "## Integrity Protection Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Integrity hashes generated" >> $GITHUB_STEP_SUMMARY
          echo "✅ Hashes registered with integrity service" >> $GITHUB_STEP_SUMMARY
          echo "✅ Frontend built successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Protected Components" >> $GITHUB_STEP_SUMMARY
          cd frontend/frontend
          jq -r '.components[] | "- **\(.componentId)**: `\(.combinedHash[:16])...`"' public/integrity-hashes.json >> $GITHUB_STEP_SUMMARY

  verify-integrity-service:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    
    steps:
      - name: Health check integrity service
        run: |
          echo "Checking integrity service health..."
          HEALTH=$(curl -s "${INTEGRITY_API}/health" || echo "failed")
          echo "Response: $HEALTH"
          
          if echo "$HEALTH" | jq -e '.status == "healthy"' > /dev/null 2>&1; then
            echo "✅ Integrity service is healthy"
          else
            echo "⚠️ Integrity service health check failed"
            exit 1
          fi
