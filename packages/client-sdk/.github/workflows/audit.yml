name: NPM Audit

on:
  push:
    paths:
      - 'packages/client-sdk/**'
  pull_request:
    paths:
      - 'packages/client-sdk/**'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: packages/client-sdk
      - name: Run npm audit
        run: npm run audit
        working-directory: packages/client-sdk
