[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "amttp"
version = "1.0.0"
description = "AMTTP Python SDK - ML-powered fraud detection for blockchain transactions"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "AMTTP Team", email = "dev@amttp.io"}
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Security",
    "Topic :: Office/Business :: Financial",
]
keywords = ["amttp", "fraud-detection", "blockchain", "ethereum", "ml", "security"]
requires-python = ">=3.9"
dependencies = [
    "requests>=2.28.0",
    "httpx>=0.24.0",
    "web3>=6.0.0",
    "eth-account>=0.8.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.0.0",
    "black>=23.0.0",
    "mypy>=1.0.0",
    "ruff>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/amttp/amttp-python-sdk"
Documentation = "https://docs.amttp.io/sdk/python"
Repository = "https://github.com/amttp/amttp-python-sdk"

[tool.setuptools.packages.find]
where = ["."]
include = ["amttp*"]

[tool.black]
line-length = 100
target-version = ["py39", "py310", "py311", "py312"]

[tool.ruff]
line-length = 100
select = ["E", "F", "I", "N", "W"]

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
