# AMTTP Cloud Training Configuration

training:
  # TabNet Configuration
  tabnet:
    n_d: 64                    # Width of decision prediction layer
    n_a: 64                    # Width of attention embedding
    n_steps: 5                 # Number of steps in architecture
    gamma: 1.5                 # Feature reusage coefficient
    lambda_sparse: 1e-4        # Sparsity regularization
    max_epochs: 100
    patience: 15
    batch_size: 16384          # Large batch for GPU efficiency
    virtual_batch_size: 512
    learning_rate: 0.02
    weight_decay: 1e-5
    step_size: 50              # LR scheduler step
    gamma_lr: 0.9              # LR scheduler gamma

  # Graph Neural Network Configuration
  gnn:
    hidden_dim: 128
    num_layers: 3
    dropout: 0.2
    learning_rate: 0.001
    weight_decay: 1e-4
    max_epochs: 200
    patience: 20
    batch_size: 512

# Data Configuration
data:
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  random_seed: 42
  stratify: true             # Stratify by fraud label
  
  # Feature Engineering
  features:
    # Transaction features
    amount_bins: 10          # Amount quantile bins
    time_features: true      # Hour, day of week, etc.
    velocity_windows: [1, 24, 168]  # 1h, 24h, 1week
    
    # Graph features (for GNN)
    node_features: ['amount', 'timestamp', 'account_age']
    edge_features: ['frequency', 'total_amount']
    graph_window_hours: 24

# Performance Thresholds
performance:
  min_accuracy: 0.85
  min_auc: 0.90
  min_precision: 0.80
  min_recall: 0.75

# Google Colab Configuration
colab:
  runtime_type: "GPU"        # GPU, TPU, or None
  gpu_type: "T4"             # T4, V100, or A100
  high_ram: false            # Use high-RAM runtime
  
  # Drive configuration
  drive_folder: "AMTTP_Models"
  auto_backup: true
  backup_frequency: 10       # Save every N epochs

# Model Deployment
deployment:
  model_format: "pytorch"    # pytorch, onnx, or tensorrt
  quantization: false        # Post-training quantization
  compression: true          # Model compression
  
  # API Integration
  api_timeout: 200           # Max inference time (ms)
  batch_inference: false     # Support batch requests
  
# Monitoring
monitoring:
  track_drift: true          # Monitor feature drift
  alert_threshold: 0.05      # Alert if accuracy drops
  log_predictions: true      # Log all predictions
  
# Security
security:
  encrypt_models: false      # Encrypt model files
  audit_access: true         # Log model access
  data_retention_days: 90    # Keep training data for N days