services:
  helia:
    image: ipfs/kubo:latest
    container_name: helia-node
    ports: ['5001:5001','8080:8080']
    volumes: ['./data/helia:/data/ipfs']
    restart: unless-stopped

  hardhat:
    build:
      context: .
      dockerfile: ./hardhat/Dockerfile
    container_name: hardhat-node
    ports: ['8545:8545']
    volumes:
      - ./contracts:/app/contracts
      - ./scripts:/app/scripts
      - ./hardhat.config.cjs:/app/hardhat.config.cjs
      - ./test:/app/test
    restart: unless-stopped

  mongo:
    image: mongo:6
    container_name: mongo-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: changeme
    ports: ['27017:27017']
    volumes: ['./data/mongo:/data/db']
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio-server
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: localtest
      MINIO_ROOT_PASSWORD: localtest123
    ports: ['9000:9000','9001:9001']
    volumes: ['./data/minio:/data']
    restart: unless-stopped

  vault:
    image: hashicorp/vault:1.17.6
    container_name: vault-server
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_ADDR: http://0.0.0.0:8200
    ports: ['8200:8200']
    cap_add: [IPC_LOCK]
    restart: unless-stopped

  vault-init:
    image: hashicorp/vault:1.17.6
    container_name: vault-init
    depends_on:
      - vault
    volumes:
      - ./scripts/vault-init.sh:/usr/local/bin/vault-init.sh
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    command: "sh /usr/local/bin/vault-init.sh"

  memgraph:
    image: memgraph/memgraph:latest
    container_name: memgraph
    command: >-
      --log-level=INFO
      --query-execution-timeout-sec=30
      --memory-limit=2048
    ports: ['7687:7687']
    restart: unless-stopped

  memgraph-lab:
    image: memgraph/lab:latest
    container_name: memgraph-lab
    ports: ['3000:3000']
    depends_on:
      - memgraph
    environment:
      - QUICK_CONNECT_MG_HOST=memgraph
      - QUICK_CONNECT_MG_PORT=7687
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --save "" --appendonly no --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports: ['6379:6379']
    volumes:
      - ./data/redis:/data
    restart: unless-stopped

  oracle-service:
    build:
      context: ./backend/oracle-service
      dockerfile: Dockerfile
    container_name: oracle-service
    env_file:
      - ./backend/oracle-service/.env
    dns:
      - 8.8.8.8
    ports: ['3001:3000']
    depends_on:
      - hardhat
      - mongo
      - memgraph
      - redis
      - risk-engine
    restart: unless-stopped

  # zkNAF Zero-Knowledge Proof Service (Demo Mode)
  zknaf:
    build:
      context: ./backend/compliance-service
      dockerfile: Dockerfile.zknaf
    container_name: amttp-zknaf
    environment:
      - ZKNAF_PORT=8010
    ports: ['8010:8010']
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/zknaf/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  risk-engine:
    build:
      context: ./ml/Automation/risk_engine
      dockerfile: Dockerfile
    container_name: risk-engine
    environment:
      - PYTHONPATH=/app
    ports: ['8002:8000']
    volumes:
      - ./ml/Automation/risk_engine:/app
      - ./ml/Automation/ml_pipeline/models/trained:/app/models
      - ./processed:/app/processed
    depends_on:
      - mongo
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════════
  # COMPLIANCE MICRO-SERVICES
  # ═══════════════════════════════════════════════════════════════════════════

  sanctions:
    build:
      context: ./backend/compliance-service
      dockerfile: Dockerfile.sanctions
    container_name: amttp-sanctions
    ports: ['8004:8004']
    volumes:
      - ./backend/compliance-service/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  geo-risk:
    build:
      context: ./backend/compliance-service
      dockerfile: Dockerfile.geo
    container_name: amttp-geo-risk
    ports: ['8006:8006']
    volumes:
      - ./backend/compliance-service/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  monitoring:
    build:
      context: ./backend/compliance-service
      dockerfile: Dockerfile.monitoring
    container_name: amttp-monitoring
    ports: ['8005:8005']
    volumes:
      - ./backend/compliance-service/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  graph-api:
    build:
      context: ./ml/Automation/ml_pipeline
      dockerfile: Dockerfile.graph
    container_name: amttp-graph
    ports: ['8001:8001']
    environment:
      MEMGRAPH_HOST: memgraph
      MEMGRAPH_PORT: "7687"
    depends_on:
      - memgraph
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # AMTTP Compliance Orchestrator
  orchestrator:
    build:
      context: ./backend/compliance-service
      dockerfile: Dockerfile
    container_name: compliance-orchestrator
    environment:
      # Storage backends
      MONGODB_URL: mongodb://admin:changeme@mongo:27017
      MONGODB_DB: amttp
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: localtest
      MINIO_SECRET_KEY: localtest123
      MINIO_SECURE: "false"
      MINIO_BUCKET: amttp-documents
      IPFS_API_URL: http://helia:5001
      # Compliance services (Docker internal networking)
      ML_RISK_URL: http://risk-engine:8000
      GRAPH_URL: http://graph-api:8001
      SANCTIONS_URL: http://sanctions:8004
      MONITORING_URL: http://monitoring:8005
      GEO_RISK_URL: http://geo-risk:8006
      POLICY_URL: http://localhost:8003
      FCA_URL: http://localhost:8002
      # Security
      AUTH_ENABLED: "false"
      USE_STORAGE_LAYER: "true"
    ports: ['8007:8007']
    volumes:
      - ./backend/compliance-service:/app
    depends_on:
      - mongo
      - redis
      - minio
      - helia
      - risk-engine
      - sanctions
      - geo-risk
      - monitoring
      - graph-api
    restart: unless-stopped

  # AMTTP UI Integrity Service (Bybit-style attack prevention)
  integrity:
    build:
      context: ./backend/compliance-service
      dockerfile: Dockerfile.integrity
    container_name: integrity-service
    environment:
      INTEGRITY_ADMIN_KEY: "${INTEGRITY_ADMIN_KEY:-dev-key}"
    ports: ['8008:8008']
    volumes:
      - ./backend/compliance-service:/app
      - ./backend/compliance-service/data/integrity:/app/data/integrity
    restart: unless-stopped

